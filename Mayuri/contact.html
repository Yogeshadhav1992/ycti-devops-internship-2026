<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Smart EDU Lab</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
background:#e6eef2;
}

/* NAVBAR */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 70px;
background:#0f3d37;
color:white;
}

header h1{
font-size:24px;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:16px;
}

nav a:hover{
color:#90ee90;
}

/* CONTACT SECTION */

.contact-section{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:60px;
}

.contact-card{
width:900px;
background:white;
border-radius:20px;
display:flex;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
overflow:hidden;
}

/* LEFT FORM */

.form-side{
flex:1;
padding:40px;
}

.form-side h2{
margin-bottom:10px;
}

.form-side p{
font-size:14px;
margin-bottom:25px;
color:#555;
}

.form-side input,
.form-side textarea{
width:100%;
border:none;
border-bottom:1px solid #999;
padding:10px;
margin-bottom:20px;
outline:none;
}

.form-side button{
background:#0f3d37;
color:white;
padding:10px 25px;
border:none;
border-radius:20px;
cursor:pointer;
}

.form-side button:hover{
background:#14524b;
}

/* RIGHT SIDE */

.info-side{
flex:1;
display:flex;
align-items:center;
justify-content:center;
background:#dff3f1;
}

/* CIRCLE COLOR SAME AS FOOTER */

.info-circle{
background:#0f3d37;
width:260px;
height:260px;
border-radius:50%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
color:white;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.info-circle h3{
margin-bottom:10px;
}

.info-circle p{
font-size:14px;
}

/* FOOTER */

footer{
background:#0f3d37;
color:white;
text-align:center;
padding:18px;
margin-top:auto;
}

</style>

</head>

<body>

<header>

<h1>📘 Smart EDU Lab</h1>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="#">Features</a>
<a href="#">Dashboard</a>
<a href="#">Contact</a>
<a href="#">Login</a>
</nav>

</header>


<section class="contact-section">

<div class="contact-card">

<div class="form-side">

<h2>Contact Us</h2>

<p>Feel free to contact us if you have any question.</p>

<form>

<input type="text" placeholder="Name">

<input type="email" placeholder="Email Address">

<textarea rows="4" placeholder="Your Message"></textarea>

<button type="submit">Submit</button>

</form>

</div>


<div class="info-side">

<div class="info-circle">

<h3>Smart EDU Lab</h3>

<p>📍 Rahuri, Ahmednagar, Maharashtra</p>
<p>📞 +91 8208172072</p>
<p>✉ yctisoftware.in@gmail.com</p>
</div>

</div>

</div>

</section>


<footer>

<p>© 2026 Smart EDU Lab | All Rights Reserved</p>

<p>
<a href="#">Facebook</a> |
<a href="#">Twitter</a> |
<a href="#">Instagram</a>
</p>

</footer>

</body>
</html>
