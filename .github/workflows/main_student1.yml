name: YCTI DevOps CI Pipeline

on:
  push:
    branches:
      - main
      - student1
      - student2
      - student3
      - student4
      - student5
      - student6
      - student7
      - student8
      - student9
      - student10

jobs:

  student-workflow:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
