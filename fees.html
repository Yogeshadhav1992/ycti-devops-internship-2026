<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart EDU Lab - Fees Payment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* Page Layout */

body{
background:linear-gradient(to right,#e6f3ff,#ffffff);
min-height:100vh;
display:flex;
flex-direction:column;
}

/* Navbar */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 60px;
background:#2a6f97;
color:white;
}

nav h2{
font-size:22px;
}

nav ul{
display:flex;
list-style:none;
gap:25px;
}

nav ul li{
cursor:pointer;
}

/* Center Container */

.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* Card */

.card{
width:420px;
padding:30px;
border-radius:15px;
background:white;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.card h2{
text-align:center;
margin-bottom:20px;
color:#2a6f97;
}

.input-group{
margin-bottom:15px;
}

label{
font-size:14px;
display:block;
margin-bottom:5px;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

/* Payment Method */

.payment-method{
display:flex;
gap:10px;
margin-top:10px;
}

.method{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
text-align:center;
cursor:pointer;
}

.method.active{
background:#2a6f97;
color:white;
}

.card-section{
display:none;
margin-top:10px;
}

/* Button */

button{
width:100%;
margin-top:20px;
padding:12px;
border:none;
border-radius:25px;
background:#2a6f97;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1f5573;
}

/* Footer */

footer{
background:#2a6f97;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav>

<h2>🎓 Smart EDU Lab</h2>

<ul>
<li>Home</li>
<li>Courses</li>
<li>Dashboard</li>
<li>Contact</li>
<li>Login</li>
</ul>

</nav>

<!-- Center Payment Card -->

<div class="container">

<div class="card">

<h2>Fees Payment</h2>

<div class="input-group">
<label>Student Name</label>
<input type="text" id="name">
</div>

<div class="input-group">
<label>Student ID</label>
<input type="text" id="sid">
</div>

<div class="input-group">
<label>Select Course</label>
<select id="course" onchange="setFees()">

<option value="">Select Course</option>
<option value="java">Java Full Stack</option>
<option value="python">Python Full Stack</option>
<option value="devops">DevOps</option>
<option value="uiux">UI/UX Design</option>

</select>
</div>

<div class="input-group">
<label>Amount</label>
<input type="text" id="amount" readonly>
</div>

<label>Payment Method</label>

<div class="payment-method">

<div class="method" id="upiBtn" onclick="selectMethod('upi')">
UPI
</div>

<div class="method" id="cardBtn" onclick="selectMethod('card')">
Card
</div>

</div>

<div class="card-section" id="cardSection">

<div class="input-group">
<label>Card Number</label>
<input type="text">
</div>

<div class="input-group">
<label>Expiry Date</label>
<input type="text" placeholder="MM/YY">
</div>

<div class="input-group">
<label>CVV</label>
<input type="password">
</div>

</div>

<button onclick="payFees()">Pay Fees</button>

</div>

</div>

<!-- Footer -->

<footer>

© 2026 Smart EDU Lab. All rights reserved

</footer>

<script src="fees.js"></script>

</body>
</html>
